# Operator: cp 30-secret.example.yaml 30-secret.yaml and fill the values.
#
# 30-secret.yaml is gitignored — never commit real tokens.
#
# Keys that MAY be set:
#   ERPNET_ADMIN_TOKEN       — operator-controlled admin token. If empty,
#                              the proxy auto-bootstraps one on first
#                              boot (visible only in `kubectl logs`).
#   ERPNET_FP_RESCUE_TOKEN   — master rescue token (cross-fleet takeover
#                              ability via /admin/rescue/grab). Leave
#                              empty to DISABLE rescue (recommended for
#                              sites that don't need it).
apiVersion: v1
kind: Secret
metadata:
  name: erpnet-fp-tokens
  namespace: erpnet-fp-mec
type: Opaque
stringData:
  ERPNET_ADMIN_TOKEN: ""
  ERPNET_FP_RESCUE_TOKEN: ""
