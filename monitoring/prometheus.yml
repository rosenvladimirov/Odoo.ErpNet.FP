# Prometheus scrape config — local stack, scrapes only the proxy.
# Lightweight: 5s interval gives sub-second visibility into device
# events without burning resources.

global:
  scrape_interval: 15s         # default for self + future targets
  evaluation_interval: 30s
  external_labels:
    instance: erpnet-fp-local

scrape_configs:
  # The proxy itself
  - job_name: erpnet-fp
    scrape_interval: 5s        # scanner / scale events should appear quickly
    metrics_path: /metrics
    static_configs:
      - targets: ['odoo-erpnet-fp:8001']
        labels:
          service: erpnet-fp

  # Prometheus self-metrics (cheap, useful for "is monitoring up?")
  - job_name: prometheus
    scrape_interval: 30s
    static_configs:
      - targets: ['localhost:9090']
