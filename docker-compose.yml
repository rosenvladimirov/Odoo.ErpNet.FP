---
# Standalone deployment — proxy + Traefik in one stack.
#
# Drop-in replacement for the original ErpNet.FP setup:
#   ../ErpNet.FP/docker-compose.yml — Traefik routing the C# server.
# Same hostnames, same TLS, same CORS — just our Python proxy in place
# of the C# one. Existing clients (l10n_bg_erp_net_fp Odoo addon, POS
# UI) work unchanged because the URL stays exactly the same.
#
# Quick start:
#   mkdir -p config certs
#   cp config-examples/config.yaml config/config.yaml
#   cp /path/to/cert.pem certs/cert.pem    # see ../ErpNet.FP/certs/
#   cp /path/to/key.pem  certs/key.pem
#   docker compose up -d
#
#   curl --insecure https://localhost/printers
#   curl https://erpnet-fp.odoo-shell.space/printers   # if DNS points here

services:
  # ─── Traefik reverse proxy — ───────────────────────────────────
  # Routes the same hostnames as the original ErpNet.FP stack:
  #   erpnet-fp.odoo-shell.space  (cloud / public DNS)
  #   erpnet.local                (LAN-local hostname)
  #   localhost                    (host-only)
  # All over HTTPS (websecure entrypoint), with the CORS middleware
  # from dynamic.yml so browser fetch() works from configured origins.
  traefik:
    image: traefik:v2.10
    container_name: traefik
    restart: unless-stopped
    ports:
      # Bind only to loopback by default — same as ErpNet.FP.
      # Open to all interfaces by changing to "443:443" if needed.
      - "127.0.0.1:443:443"
    environment:
      # Cloudflare DNS-01 ACME challenge — Zone:DNS:Edit on the zone
      # holding *.lan.mcpworks.net (currently the parent mcpworks.net).
      CLOUDFLARE_DNS_API_TOKEN: ${CLOUDFLARE_DNS_API_TOKEN}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./docker/traefik/traefik.yml:/etc/traefik/traefik.yml:ro
      - ./docker/traefik/dynamic.yml:/etc/traefik/dynamic.yml:ro
      - ./certs:/certs:ro
      - ./letsencrypt:/letsencrypt
    networks:
      - erpnet

  # ─── Our Python proxy (replaces ErpNet.FP C# container) ─────────
  odoo-erpnet-fp:
    image: rosenvladimirov/odoo-erpnet-fp:latest
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: odoo-erpnet-fp
    restart: unless-stopped
    networks:
      - erpnet

    # Same as ErpNet.FP — privileged for /dev access to USB devices
    privileged: true
    group_add:
      - dialout
    volumes:
      - /dev:/dev
      - ./config:/app/config:ro
      - ./certs:/app/certs:ro

    expose:
      - "8001"

    labels:
      - "traefik.enable=true"
      # Same hostnames as the original ErpNet.FP stack — clients need
      # NO change to the host URL configured on l10n_bg_erp_net_fp.
      # Two routers — one for legacy hostnames (uses static cert),
      # one for the new lan.mcpworks.net subdomain (uses ACME wildcard
      # cert, auto-renewed by the `cf` resolver).
      - "traefik.http.routers.erpnet.rule=Host(`erpnet.local`) || Host(`localhost`) || Host(`erpnet-fp.odoo-shell.space`)"
      - "traefik.http.routers.erpnet.entrypoints=websecure"
      - "traefik.http.routers.erpnet.tls=true"
      - "traefik.http.routers.erpnet.middlewares=cors@file"
      - "traefik.http.routers.erpnet-lan.rule=Host(`erpnet.lan.mcpworks.net`) || HostRegexp(`{sub:[a-z0-9-]+}.lan.mcpworks.net`)"
      - "traefik.http.routers.erpnet-lan.entrypoints=websecure"
      - "traefik.http.routers.erpnet-lan.tls=true"
      - "traefik.http.routers.erpnet-lan.tls.certresolver=cf"
      - "traefik.http.routers.erpnet-lan.tls.domains[0].main=*.lan.mcpworks.net"
      - "traefik.http.routers.erpnet-lan.tls.domains[0].sans=lan.mcpworks.net"
      - "traefik.http.routers.erpnet-lan.middlewares=cors@file"
      - "traefik.http.services.erpnet.loadbalancer.server.port=8001"

    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8001/healthz', timeout=3)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

networks:
  erpnet:
    name: erpnet
