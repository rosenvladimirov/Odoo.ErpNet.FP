---
# Standalone deployment — proxy + Traefik in one stack.
#
# Drop-in replacement for the original ErpNet.FP setup:
#   ../ErpNet.FP/docker-compose.yml — Traefik routing the C# server.
# Same hostnames, same TLS, same CORS — just our Python proxy in place
# of the C# one. Existing clients (l10n_bg_erp_net_fp Odoo addon, POS
# UI) work unchanged because the URL stays exactly the same.
#
# Quick start:
#   mkdir -p config certs
#   cp config-examples/config.yaml config/config.yaml
#   cp /path/to/cert.pem certs/cert.pem    # see ../ErpNet.FP/certs/
#   cp /path/to/key.pem  certs/key.pem
#   docker compose up -d
#
#   curl --insecure https://localhost/printers
#   curl https://erpnet-fp.odoo-shell.space/printers   # if DNS points here

services:
  # ─── Traefik reverse proxy — ───────────────────────────────────
  # Routes the same hostnames as the original ErpNet.FP stack:
  #   erpnet-fp.odoo-shell.space  (cloud / public DNS)
  #   erpnet.local                (LAN-local hostname)
  #   localhost                    (host-only)
  # All over HTTPS (websecure entrypoint), with the CORS middleware
  # from dynamic.yml so browser fetch() works from configured origins.
  traefik:
    image: traefik:v2.10
    container_name: traefik
    restart: unless-stopped
    ports:
      # Bind only to loopback by default — same as ErpNet.FP.
      # Open to all interfaces by changing to "443:443" if needed.
      - "127.0.0.1:443:443"
    environment:
      # Cloudflare DNS-01 ACME challenge — Zone:DNS:Edit on the zone
      # holding *.lan.mcpworks.net (currently the parent mcpworks.net).
      CLOUDFLARE_DNS_API_TOKEN: ${CLOUDFLARE_DNS_API_TOKEN}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./docker/traefik/traefik.yml:/etc/traefik/traefik.yml:ro
      - ./docker/traefik/dynamic.yml:/etc/traefik/dynamic.yml:ro
      - ./certs:/certs:ro
      - ./letsencrypt:/letsencrypt
    networks:
      - erpnet

  # ─── Our Python proxy (replaces ErpNet.FP C# container) ─────────
  odoo-erpnet-fp:
    image: rosenvladimirov/odoo-erpnet-fp:latest
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: odoo-erpnet-fp
    restart: unless-stopped
    networks:
      - erpnet

    # Same as ErpNet.FP — privileged for /dev access to USB devices
    privileged: true
    group_add:
      - dialout
    volumes:
      - /dev:/dev
      - ./config:/app/config:ro
      - ./certs:/app/certs:ro
      # Writable cache (persistent ISL device-info between restarts).
      - ./data:/app/data:rw

    expose:
      - "8001"

    labels:
      - "traefik.enable=true"
      # Same hostnames as the original ErpNet.FP stack — clients need
      # NO change to the host URL configured on l10n_bg_erp_net_fp.
      # Two routers — one for legacy hostnames (uses static cert),
      # one for the new lan.mcpworks.net subdomain (uses ACME wildcard
      # cert, auto-renewed by the `cf` resolver).
      - "traefik.http.routers.erpnet.rule=Host(`erpnet.local`) || Host(`localhost`) || Host(`erpnet-fp.odoo-shell.space`)"
      - "traefik.http.routers.erpnet.entrypoints=websecure"
      - "traefik.http.routers.erpnet.tls=true"
      - "traefik.http.routers.erpnet.middlewares=cors@file"
      - "traefik.http.routers.erpnet-lan.rule=Host(`erpnet.lan.mcpworks.net`) || HostRegexp(`{sub:[a-z0-9-]+}.lan.mcpworks.net`)"
      - "traefik.http.routers.erpnet-lan.entrypoints=websecure"
      - "traefik.http.routers.erpnet-lan.tls=true"
      - "traefik.http.routers.erpnet-lan.tls.certresolver=cf"
      - "traefik.http.routers.erpnet-lan.tls.domains[0].main=*.lan.mcpworks.net"
      - "traefik.http.routers.erpnet-lan.tls.domains[0].sans=lan.mcpworks.net"
      - "traefik.http.routers.erpnet-lan.middlewares=cors@file"
      - "traefik.http.services.erpnet.loadbalancer.server.port=8001"

    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8001/healthz', timeout=3)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ─── Local Prometheus — memory-capped, 7-day retention ──────────
  # Scrapes ONLY the proxy's /metrics endpoint. Bound to localhost
  # only so it doesn't show up on any public network. Together with
  # Grafana below adds ~220 MB RAM to the stack.
  prometheus:
    image: prom/prometheus:v2.54.1
    container_name: erpnet-prometheus
    restart: unless-stopped
    user: "65534:65534"   # nobody
    networks:
      - erpnet
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=7d"
      - "--storage.tsdb.retention.size=512MB"
      - "--web.console.libraries=/usr/share/prometheus/console_libraries"
      - "--web.console.templates=/usr/share/prometheus/consoles"
      - "--web.listen-address=:9090"
    ports:
      - "127.0.0.1:9090:9090"   # local-only access
    mem_limit: 192m
    deploy:
      resources:
        limits:
          memory: 192m
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "2"

  # ─── Local Grafana — anonymous viewer, pre-loaded dashboard ─────
  # Open http://localhost:3001 in browser. No login needed; default
  # role is Viewer. Edits / new dashboards require admin login
  # (admin / change-me unless GF_SECURITY_ADMIN_PASSWORD is set).
  grafana:
    image: grafana/grafana-oss:11.2.0
    container_name: erpnet-grafana
    restart: unless-stopped
    user: "472:472"   # grafana
    networks:
      - erpnet
    volumes:
      - grafana-data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: "Viewer"
      GF_USERS_DEFAULT_THEME: "dark"
      GF_INSTALL_PLUGINS: ""
      GF_LOG_LEVEL: "warn"
      GF_SERVER_ROOT_URL: "https://grafana.lan.mcpworks.net"
      GF_SERVER_DOMAIN: "grafana.lan.mcpworks.net"
      # Allow embedding Grafana panels in an Odoo backend iframe.
      # Without this Grafana sends X-Frame-Options: DENY and the
      # iframe stays blank.
      GF_SECURITY_ALLOW_EMBEDDING: "true"
      GF_SECURITY_COOKIE_SAMESITE: "none"   # required when iframe origin differs
      GF_SECURITY_COOKIE_SECURE: "true"
    ports:
      - "127.0.0.1:3001:3000"   # local-only fallback; 3001 to avoid Odoo collision
    mem_limit: 128m
    deploy:
      resources:
        limits:
          memory: 128m
    depends_on:
      - prometheus
    labels:
      # Wildcard cert *.lan.mcpworks.net is configured globally on the
      # websecure entrypoint, so we don't repeat resolver/domains here.
      # `priority: 100` puts the grafana router AHEAD of the proxy's
      # erpnet-lan router (which matches any *.lan.mcpworks.net via
      # HostRegexp). Without it, requests to grafana.lan.mcpworks.net
      # fall into the proxy and return 404.
      - "traefik.enable=true"
      # Default router — full Grafana UI for logged-in users. Anonymous
      # users still hit this for any path that isn't `/`, but with the
      # anon Viewer role they can't reach Settings / Connections /
      # Plugins anyway.
      - "traefik.http.routers.grafana.rule=Host(`grafana.lan.mcpworks.net`)"
      - "traefik.http.routers.grafana.entrypoints=websecure"
      - "traefik.http.routers.grafana.tls=true"
      - "traefik.http.routers.grafana.priority=100"
      - "traefik.http.services.grafana.loadbalancer.server.port=3000"
      # Anon-kiosk redirect — when an unauthenticated visitor opens the
      # root URL we send them straight to the dashboard in kiosk mode
      # (no top nav, no sidebar, no edit / settings affordances).
      # Logged-in users carry a `grafana_session=` cookie so the
      # negative HeadersRegexp keeps this router from matching them.
      # priority=200 beats the default `grafana` router on the same
      # path.
      - "traefik.http.middlewares.grafana-kiosk.redirectregex.regex=^https?://grafana\\.lan\\.mcpworks\\.net/?(\\?.*)?$$"
      - "traefik.http.middlewares.grafana-kiosk.redirectregex.replacement=https://grafana.lan.mcpworks.net/d/erpnet-fp-overview/?orgId=1&kiosk&theme=dark&refresh=10s"
      - "traefik.http.middlewares.grafana-kiosk.redirectregex.permanent=false"
      - "traefik.http.routers.grafana-anon.rule=Host(`grafana.lan.mcpworks.net`) && Path(`/`) && !HeadersRegexp(`Cookie`, `grafana_session=`)"
      - "traefik.http.routers.grafana-anon.entrypoints=websecure"
      - "traefik.http.routers.grafana-anon.tls=true"
      - "traefik.http.routers.grafana-anon.priority=200"
      - "traefik.http.routers.grafana-anon.middlewares=grafana-kiosk"
      - "traefik.http.routers.grafana-anon.service=grafana"
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "2"

volumes:
  prometheus-data:
  grafana-data:

networks:
  erpnet:
    name: erpnet
