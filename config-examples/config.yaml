# Native YAML configuration for Odoo.ErpNet.FP.
#
# Use this format for new deployments — it supports TLS, log-level, and
# explicit driver/transport hints. For compatibility with existing
# ErpNet.FP installations, configuration.json is also accepted (see
# config-examples/configuration.json).

server:
  host: "0.0.0.0"
  port: 8001
  log_level: info  # debug | info | warning | error

  # ─── TLS / HTTPS ────────────────────────────────────────────────
  # Any PEM-encoded cert/key pair works:
  #   • Cloudflare Origin Certificate (15-year validity, free —
  #     download from Cloudflare dashboard → SSL/TLS → Origin Server)
  #   • Let's Encrypt (use certbot or Caddy, or provision externally)
  #   • Step-CA self-issued (see odoo-iot-docker/docker/step-ca/...)
  #   • OpenSSL self-signed (only for testing — clients will warn)
  #
  # When enabled, the server listens on `port` with TLS instead of HTTP.
  # Change `port: 8443` to mark it explicitly as HTTPS.
  tls:
    enabled: false
    certfile: /app/certs/origin-cert.pem
    keyfile: /app/certs/origin-key.pem
    keyfile_password: null  # only if your private key is encrypted
    ca_certs: null          # path to CA bundle for client-cert auth (mTLS)
    require_client_cert: false

  # ─── Outbound iot.box announcement ──────────────────────────────
  # When enabled, the proxy POSTs /iot/setup to a remote Odoo every
  # `interval_seconds`, registering itself as an iot.box and creating
  # iot.device records for everything in the printer/scale/reader/
  # display/pinpad registries. Same wire format as Odoo's official
  # Raspberry Pi IoT box image — Odoo EE iot module sees us as a
  # normal IoT box without any custom code on the server side.
  #
  # Why outbound: the Odoo server can't always reach the proxy
  # (LAN-only DNS, browser-side Cloudflare tunnel, /etc/hosts on the
  # operator laptop). Going proxy → Odoo over plain HTTPS sidesteps
  # the routing problem entirely.
  #
  # Setup:
  #   1. On Odoo: Settings → Technical → Parameters → System
  #      Parameters → create the token param. The key DEPENDS ON
  #      the Odoo version:
  #         • Odoo 18: key = `iot_token` (no prefix); reusable
  #         • Odoo 19+: key = `iot.iot_token` (prefixed); single-use,
  #           Odoo wipes the param after the first successful setup,
  #           so re-set it before each new box pairing.
  #      Set the value to a long random string and copy it.
  #   2. Set `token` below to the same value.
  #   3. Set `identifier` to a stable unique string (e.g. MAC of the
  #      host's primary NIC, or a UUID generated once and persisted).
  #   4. Set `advertised_host` to the hostname browsers will fetch
  #      the proxy at — must NOT be left empty inside Docker (else
  #      `socket.gethostname()` returns the container ID).
  #   5. Restart proxy. iot.box appears in Odoo's IoT view; its
  #      iot.device records appear under it.
  iot_setup:
    enabled: false
    odoo_url: ""           # e.g. https://www1.odoo-shell.space
    token: ""              # matches Odoo's iot_token system param
    identifier: ""         # stable unique, e.g. rosen-laptop-ddb6f47
    name: "ErpNet.FP proxy"
    advertised_host: ""    # browser-routable hostname; required in Docker
    interval_seconds: 60   # Odoo's official IoT image announces every 60s

# Auto-detect connected devices.
#
# When true:
#   * Printers — startup probe of COM ports for known fiscal-printer
#     vendors (Datecs, Eltrade, Tremol).
#   * Readers — udev-based hot-plug listener for CDC ACM scanners
#     (Honeywell 1470g, Datalogic, generic CN scanners) and pseudo
#     ttys from hid2serial (`/dev/ttyV*`). Vendor-specific defaults
#     (baudrate, encoding) are applied automatically; manual entries
#     in `readers:` below take precedence on port collision.
#
# When false (default): only entries explicitly listed below are loaded.
#
# Production tip: leave it FALSE on shop-floor deploys where the
# device set is fixed — predictability beats convenience there.
# Leave it TRUE on dev / pilot machines so swapping a USB scanner
# doesn't require a config edit + restart cycle.
auto_detect: false

# ─── Printers ─────────────────────────────────────────────────────
#
# Each entry registers one logical printer. The `id` field becomes the
# printerId in URLs (e.g. /printers/fp1/status). It should be stable —
# clients store it and use it forever.
#
# Supported drivers:
#   datecs.pm   — Datecs FP-700 MX and other PM v2.11.4 (NEW MX series)
#   datecs.isl  — Datecs ISL family (full coverage):
#                   P/C : DP-25, DP-05, WP-50, DP-35
#                   X   : FP-700X, WP-500X, DP-150X, FMP-350X, FMP-55X
#                   FP  : FP-800, FP-2000, FP-650
# Coming later:
#   daisy / tremol.zfp / tremol.icp / eltrade / incotex

printers:
  - id: fp1
    driver: datecs.pm
    transport: serial
    port: /dev/ttyUSB0
    baudrate: 115200
    operator: "1"
    operator_password: "0000"
    till_number: 1
    nsale_prefix: DT  # 2-letter prefix for Unique Sale Numbers (UNS)

  # Datecs DP-150X (X-series ISL) over serial:
  # - id: dp150
  #   driver: datecs.isl
  #   transport: serial
  #   port: /dev/ttyUSB1
  #   baudrate: 115200
  #   operator: "1"
  #   operator_password: "0000"

  # TCP printer over local network or VPN:
  # - id: fp2
  #   driver: datecs.pm        # or datecs.isl for older Datecs over TCP
  #   transport: tcp
  #   tcp_host: 192.168.1.77
  #   tcp_port: 9100
  #   operator: "1"
  #   operator_password: "0000"

# ─── Weighing scales ────────────────────────────────────────────
#
# Supported drivers (de-facto BG market coverage):
#   cas              — CAS PR-II / PD-II / PSD / PDS / PR-C + ALL
#                      CAS-compatible clones. Aliases: cas.pr2, cas.pd2,
#                      elicom.cash47, elicom.evl, datecs.cas
#                      (Elicom EVL must be in CASH47 jumper mode;
#                       Datecs scales must have "CAS" protocol selected
#                       in the menu — both are factory defaults on BG market.)
#   ascii_continuous — Generic ASCII broadcast scales — passive listener.
#                      Aliases: acs, jcs, generic, ascii, adam.
#                      Covers ACS 6/15, ACS 15/30, JCS, no-name OEM.
#   toledo_8217      — Mettler-Toledo industrial (Ariva-S, Viva).
#                      Aliases: mettler.toledo.8217, ariva-s.
#   ohaus_ranger     — OHAUS Ranger 3000 / Count 3000 / Valor 7000 over
#                      the Ethernet kit P/N 30037447 — TCP, port 9761
#                      fixed by firmware. `port` field is the host or
#                      `host:9761`; baudrate is ignored (Ethernet only).
#                      Aliases: ohaus, ranger3000, ranger.count3000, valor7000.

# scales:
#   # CAS PR-II 6/15 kg counter scale (~250 BGN, itgstore.bg)
#   - id: cas1
#     driver: cas
#     port: /dev/ttyUSB1
#     baudrate: 9600
#
#   # Elicom EVL in CASH47 mode (~280 BGN, BG-made)
#   - id: elicom1
#     driver: elicom.evl
#     port: /dev/ttyUSB2
#     baudrate: 9600
#
#   # ACS 6/15 budget OEM (~180 BGN — sends continuous ASCII stream)
#   - id: acs1
#     driver: acs
#     port: /dev/ttyUSB3
#     baudrate: 9600
#
#   # Mettler-Toledo Ariva-S (industrial, request-response)
#   - id: tol1
#     driver: toledo_8217
#     port: /dev/ttyUSB4
#     baudrate: 9600
#
#   # OHAUS Ranger Count 3000 with Ethernet kit 30037447
#   # (read scale's IP from menu: E.t.h.r.n.t / Ip Adr;
#   #  port 9761 is hard-coded by the kit firmware)
#   - id: ohaus1
#     driver: ohaus_ranger
#     port: 192.168.3.162           # or "192.168.3.162:9761"

# ─── Barcode readers ─────────────────────────────────────────────
#
# Two transport types:
#   hid      — USB HID keyboard-emulator; `device_path` = /dev/input/eventN
#   serial   — RS-232 / USB-CDC ACM; `port` = /dev/ttyACM? or /dev/ttyUSB?
#   external — host-side listener POSTs scans to /readers/{id}/inject
#              (workaround for BLE HID + long-lived proxy fd kernel quirk —
#               see memory/feedback_ble_hid_evdev_proxy_blocked.md)
#
# RECOMMENDATION: prefer `serial` (USB CDC) over `hid` for long-lived
# proxies. HID evdev fd-s in containerised processes can become "deaf"
# under load (kernel quirk); serial /dev/ttyACM? has none of that.

# readers:
#   # Honeywell Voyager XP 1470g 2D — USB CDC ACM mode (recommended).
#   # Out of the box the scanner is in USB HID Keyboard mode. Switch it
#   # to USB CDC by scanning these configuration barcodes from the User
#   # Guide (in order):
#   #   1) *USB Serial Driver Required*  (or *USB Serial Emulation*)
#   #   2) *9600 Baud*
#   #   3) *Eight (8) Data Bits, No Parity, One (1) Stop Bit*
#   #   4) *CR/LF Suffix*
#   # After a replug the scanner appears as /dev/ttyACM0 (vendor 0c2e).
#   - id: honeywell1
#     transport: serial
#     port: /dev/ttyACM0
#     baudrate: 9600
#     encoding: ascii
#     webhooks:
#       - https://erp.example.com/erp_net_fp/reader/scan
#
#   # USB HID keyboard scanner (Symbol/Zebra/Newland default mode).
#   # Use only on dev/desktop sessions — not on long-lived proxy hosts.
#   - id: usb1
#     transport: hid
#     device_path: /dev/input/by-id/usb-Symbol_..._S_N:5680...:3-event-kbd
#     grab: true
#
#   # BLE HID scanner — proxy doesn't open the device. A host systemd
#   # service opens /dev/input/eventN and POSTs each scan to
#   # /readers/bt1/inject. See memory/feedback_ble_hid_evdev_proxy_blocked.md
#   - id: bt1
#     transport: external
#
#   # Polimex WebSDK card events → reader bus. The iCON webstack POSTs
#   # every reader/card event to its configured server URL; point it
#   # at  POST /polimex/event  (legacy alias /hr/rfid/event). The
#   # card number is published as a scan on this reader, flowing out
#   # the normal WS/SSE/webhook/native-IoT path. `extras.polimex`
#   # keys are all optional (omitted = wildcard match).
#   - id: gate_card
#     transport: external
#     access_control: true              # ALSO push to hac.card/<id>
#     extras:
#       polimex: { convertor: 414468, controller_id: 40, reader: 1 }
#     webhooks:
#       - https://odoo.example.com/hr_attendance_access_control/card
#
# `access_control: true` works on ANY reader transport — `hid`
# (directly-attached reader), `serial` (reader → hid2serial → proxy),
# or `external` (Polimex/BLE inject). It publishes each scan on a
# SECOND native-IoT identifier `hac.card/<id>` that
# hr_attendance_access_control long-polls — a separate waiter queue,
# so it NEVER blocks/steals the standard `reader.<id>` events the
# tablet/POS consumes (the standard directly-attached-reader → POS
# scenario keeps working unchanged). Decision stays in Odoo
# (fail-secure); the open is the synchronous /access/<id>/open.

# ─── Customer-facing pole displays ──────────────────────────────
#
# Supported drivers:
#   datecs.dpd201   — Datecs DPD-201 + ESC/POS-compatible 2×20 VFD
#                     pole displays (ICD CD-5220, Birch DSP-V9 in
#                     default mode, Bematech PDX-3000 in DSP800
#                     emulation mode). Same byte protocol works
#                     across all of them.
#
# Coming later: posiflex.pd2x00, escpos.generic
#
# Encoding:
#   cp437     USA / standard Europe (Latin)              — DPD-201 sw#6 OPEN
#   cp850     multilingual Latin-1 (Western European)    — DPD-201 sw#6 SHORT
#   cp1251    Cyrillic — only on DPD-201 in "DATECS ECR" jumper mode
#             (sw#7 SHORT + sw#1..6 OPEN; firmware accepts cp1251 directly)

# displays:
#   - id: dpd1
#     driver: datecs.dpd201
#     port: /dev/ttyUSB1            # check `dmesg | grep ttyUSB` after plug-in
#     baudrate: 9600                # match jumper switches #1+#2 on the PCB
#     encoding: cp1251              # for Bulgarian; use cp437/cp850 for Latin
#     chars_per_line: 20
#     lines: 2

# ─── Cameras — live stream + license-plate recognition ──────────
#
# Access-control add-on (config-gated). Pure-fiscal deployments that
# omit the `cameras:` key behave byte-identically — no go2rtc / ALPR
# sidecar is contacted. Bring the siblings up with:
#
#     docker compose --profile cameras up -d go2rtc alpr
#
# Every camera funnels through the go2rtc sibling (the universal media
# hub). `driver`:
#   rtsp     — `source` is a plain rtsp:// URL
#   onvif    — `onvif:` block; go2rtc resolves the RTSP URI + PTZ
#   go2rtc   — stream already defined server-side in go2rtc.yaml
#   external — bus only; plates arrive via POST /cameras/{id}/inject
#
# The access DECISION is taken in Odoo (hr_attendance_access_control,
# fail-secure). This proxy only streams + reports plates via `webhooks`
# and the native `camera.<id>` IoT event channel.

# Proxy-load model (important):
#   • go2rtc_url        — INTERNAL (Docker net). Proxy → go2rtc API +
#                         the ~1 small JPEG/interval it grabs for LPR.
#                         Never browser-reachable.
#   • go2rtc_public_url — PUBLIC HTTPS (Cloudflare/Traefik). Returned
#                         to the browser/Odoo so live video flows
#                         DIRECTLY browser↔go2rtc — the proxy is NOT
#                         in the video path (zero proxy load while
#                         streaming). Compose exposes go2rtc at
#                         https://go2rtc.lan.mcpworks.net.
#   • mjpeg_relay       — pipes video THROUGH the proxy. Loads the
#                         fiscal process. Default false; turn on only
#                         for a LAN-only box with no public go2rtc.
#
# Two LPR offload modes:
#   A) proxy-pull (gate1 below) — proxy grabs 1 JPEG/interval and
#      POSTs it to the fast-alpr sidecar. Light, fine for a few cams.
#   B) zero-proxy (gateB below) — driver: external; the ALPR sidecar
#      consumes the stream itself and POSTs only recognised plates to
#      POST /cameras/{id}/inject. The proxy does NO frame work at all.

# cameras:
#   - id: gate1
#     driver: rtsp
#     source: rtsp://user:pass@192.168.1.50:554/Streaming/Channels/101
#     go2rtc_url: http://go2rtc:1984                 # internal (LPR/API)
#     go2rtc_public_url: https://go2rtc.lan.mcpworks.net   # browser/Odoo
#     mjpeg_relay: false                             # keep proxy unloaded
#     lpr:
#       enabled: true
#       engine: fast_alpr               # fast-alpr sidecar (default)
#       url: http://alpr:8002           # sibling μservice base URL
#       region: bg                      # plate-format hint (bg / eu / ...)
#       min_confidence: 0.55
#       interval_seconds: 1.0           # JPEG sampling cadence
#     dedupe_cooldown_seconds: 8        # same plate fires once per 8s
#     webhooks:
#       - https://odoo.example.com/hr_attendance_access_control/plate
#
#   - id: door2                         # Edge-ANPR camera over ONVIF
#     driver: onvif
#     go2rtc_public_url: https://go2rtc.lan.mcpworks.net
#     onvif:
#       host: 192.168.1.77
#       port: 80
#       user: admin
#       password: secret
#       subtype: 0                      # 0 = main stream, 1 = sub-stream
#       anpr: true                      # camera's own ANPR → ONVIF events
#       events_topic: ""                # vendor topic filter (optional)
#       control: true                   # ONVIF Device IO relay / PTZ
#       relay_output: ""                # relay token (empty = first)
#     lpr: { enabled: false }           # camera is the recogniser
#
# ── ANPR plate delivery — IMPORTANT (sourced research 2026-05-17) ──
# Plain ONVIF S/T does NOT carry plate text. Two paths:
#   • Profile-M cameras (Axis ALPV, Milesight PlateXpert, Hanwha
#     Road AI) push plate over standard ONVIF events/MQTT → use
#     onvif.anpr: true (PullPoint subscription, needs the [onvif]
#     extra). Lowest latency, zero proxy/sidecar work.
#   • Hikvision (ISAPI), Dahua, Uniview, Vivotek, Provision push
#     plate via a proprietary "HTTP listener / alarm host" → point
#     that at  POST /cameras/<id>/plate  (driver: external or any) —
#     the tolerant parser handles their JSON/XML, zero per-vendor
#     config, no [onvif] extra needed.
# Barrier: Odoo takes the decision (fail-secure) and fires the relay
#   synchronously via POST /cameras/<id>/control {action: open}  OR
#   the native IoT /action {action:"open"} — request→response, NO
#   60 s Fleet-queue latency (same channel a barcode read uses).
# Optics rule of thumb: EN 62676-4 ≥250 px/m on the plate, ~100 px
#   plate width, camera ≤30° both axes, locked shutter ≥1/1000 s + IR.
#   A varifocal ANPR cam beats a generic 4K cam for a gate.
# Recommended (BG/EU): Axis P1465-LE-3 LPV kit or Milesight PlateXpert
#   (clean ONVIF/Profile-M + relay) · Dahua ITC413-PW4D (best value,
#   HTTP-listener) · server-side ALPR cam: Dahua IPC-HFW5842E-ZE.
#
#   - id: gateB                         # Mode B — zero proxy frame work
#     driver: external                  # sidecar pulls stream + POSTs
#     go2rtc_public_url: https://go2rtc.lan.mcpworks.net  # for live view
#     webhooks:
#       - https://odoo.example.com/hr_attendance_access_control/plate

# ─── Access control — barrier / relay / turnstile (Phase B) ─────
#
# The DECISION is taken in Odoo (Channel-1 ⊕ Channel-2, fail-secure).
# Odoo POSTs the authorised command SYNCHRONOUSLY — zero latency,
# same channel a barcode read uses:
#     POST /access/<id>/open   {"seconds": 3}   (pulse) | {}  (latched)
#     POST /access/<id>/deny
#     GET  /access/<id>/status
# (Fleet command-queue kind `access_open` exists only as a slow
#  secondary remote-management path — NOT the decision path.)
# The proxy NEVER auto-opens — no call ⇒ barrier stays shut.

# access:
#   - id: gate1                         # generic TCP relay board
#     driver: relay_tcp
#     host: 192.168.1.9
#     port: 23
#     on_cmd: "hex:A00101A2"            # or plain text e.g. "on1\n"
#     off_cmd: "hex:A00100A1"
#     pulse_seconds: 3
#
#   - id: gate2                         # camera's own ONVIF relay
#     driver: onvif                     # (reuses Phase A OnvifNativeClient)
#     host: 192.168.1.77
#     user: admin
#     password: secret
#     relay_output: ""                  # token (empty = first)
#     pulse_seconds: 3
#
#   - id: gate3                         # Raspberry Pi GPIO ([gpio] extra)
#     driver: gpio
#     pin: 17
#     active_high: true
#     pulse_seconds: 3
#
#   - id: gate4                         # Polimex iCON130 (BG) via WebSDK
#     driver: polimex
#     host: 192.168.1.20                # webstack (LAN module) IP
#     port: 80
#     user: SDK                         # WebSDK user ("SDK" or "admin")
#     password: "0000"                  # 4-digit module key
#     bus_id: 1                         # iCON id on the RS-485 bus
#     output: 1                         # door lock output number
#     pulse_seconds: 3                  # controller auto-closes (1 round-trip)
#
#   - id: gate5                         # Hikvision access controller
#     driver: hikvision                 # DS-K2600/K2700, DS-K1T, DS-KD
#     host: 192.168.1.30
#     port: 80
#     user: admin
#     password: "*****"
#     output: 1                         # ISAPI doorNo (1-based)
#     # ISAPI: PUT /ISAPI/AccessControl/RemoteControl/door/<output>
#     #        <RemoteControlDoor><cmd>open</cmd></RemoteControlDoor>
#     # HTTP Digest; momentary relock is device-side config.
#
#   - id: gate6                         # Dahua access controller / VTO
#     driver: dahua                     # ASC/ASI/VTO (CGI-capable FW)
#     host: 192.168.1.31
#     port: 80
#     user: admin
#     password: "*****"
#     output: 1                         # accessControl.cgi channel
#     user_id: ""                       # optional, for the audit log
#     # GET /cgi-bin/accessControl.cgi?action=openDoor&channel=<output>
#     # HTTP Digest; legacy SDK-only ASC (no CGI) is UNSUPPORTED.
#
#   # driver: miv  → MIV Electronics slot (protocol pending vendor spec)
#   # driver: wiegand → scaffold (needs MCU bit-banger)
#
# Hik/Dahua: a 200/OK = command ACCEPTED, not relay proven. If the
# device door-mode is alwaysClose/disabled or the lock is miswired,
# the call still succeeds — that is a device-config issue, not an
# API failure. The device must be directly reachable from the proxy.
#
# ONE `polimex` driver covers the whole genuine Polimex range on the
# BG market: iCON50/110/115/130/180 + iCON180 SmartVend (door-type,
# default) and iCON-R / iCON110R (relay-type → set `relay_ctrl: true`
# + `mode` 1/2/3; same WebSDK + "DB" command, different `d` body).
#
#   - id: relays1                       # iCON-R relay controller
#     driver: polimex
#     host: 192.168.1.21
#     relay_ctrl: true
#     mode: 2
#     output: 1
#
# Polimex WebSDK (websdk.polimex.online/docs). Synchronous "direct
# command": POST http://<webstack>/sdk/cmd.json → {"cmd":{"id":bus_id,
# "c":"DB","d":...}} — one round-trip; door-type auto-closes after
# `pulse_seconds` (no second call, no queue). The webstack must be
# directly reachable (NOT behind NAT — NAT mode is the queued path).
#
# ⚠ NAME-COLLISION TRAP (sourced audit): securitybulgaria.com's
# "iCON100 / iCON100SR" is a DIFFERENT vendor — IDTECK (Korea),
# IDTECK serial/TCP protocol — NOT Polimex, NOT this driver. The
# SOYAL-based "iTDC" (AR-721) is also NOT covered. SBR-01CR/02CR
# standalone units are covered only if networked via a Polimex LAN
# converter (then they're normal WebSDK bus devices).

# ─── KEP (qualified e-signature token) ──────────────────────────────
# Хардуерният КЕП токен като устройство — за НОИ ЕРБЛ mutual-TLS
# (дърпане/качване болнични) + PKCS7 detached подпис (заменя StampIT).
# Изисква OpenSSL pkcs11 engine + PKCS#11 драйвер за токена (opensc и др.).
kep:
  enabled: false
  token: b-trust            # PKCS#11 token label (pkcs11-tool -T)
  cert_id: "%00%01"         # обект id, URI-encoded (p11tool --list-all)
  pin: "0000"               # PIN на authentication slot-а (НЕ signature slot!)
  engine: pkcs11
  # pkcs11_module: /usr/lib/x86_64-linux-gnu/opensc-pkcs11.so   # опц.
